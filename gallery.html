<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Myron Paes | Image Gallery</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Merriweather:ital,wght@0,300;0,400;0,700;0,900;1,300;1,400&display=swap"
      rel="stylesheet"
    />

    <style>
      /* --- VARIABLES & RESET --- */
      :root {
        --font-main: "Inter", sans-serif;
        --font-heading: "Merriweather", Georgia, serif;
        --accent: #558b2f;
        --bg-main: #fcfcfc;
        --text-main: #2d3748;
        --text-secondary: #4a5568;
      }

      html {
        scroll-behavior: smooth;
        scroll-padding-top: 100px;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: var(--font-main);
        line-height: 1.8;
        color: var(--text-main);
        background: var(--bg-main);
        overflow-x: hidden;
        -webkit-font-smoothing: antialiased;
      }

      h1,
      h2,
      h3,
      .logo {
        font-family: var(--font-heading);
        color: #1a202c;
      }

      /* Navigation */
      nav {
        position: fixed;
        top: 0;
        width: 100%;
        background: rgba(252, 252, 252, 0.95);
        backdrop-filter: blur(10px);
        padding: 1rem 2rem;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03);
        z-index: 1000;
        display: flex;
        justify-content: space-between;
        align-items: center;
        animation: fadeDown 0.5s ease-out forwards;
      }

      .logo {
        font-size: 1.3rem;
        font-weight: 900;
        text-decoration: none;
        letter-spacing: -0.5px;
      }

      .nav-links {
        display: flex;
        gap: 2rem;
        list-style: none;
      }

      .nav-links a {
        color: var(--text-secondary);
        text-decoration: none;
        font-size: 0.95rem;
        font-weight: 500;
        transition: color 0.2s;
      }

      .nav-links a:hover {
        color: var(--accent);
      }

      /* Hero Section */
      .hero {
        padding: 160px 2rem 60px;
        max-width: 900px;
        margin: 0 auto;
        text-align: center;
      }

      .hero h1 {
        font-size: 3rem;
        margin-bottom: 0.5rem;
        font-weight: 900;
        letter-spacing: -1px;
      }

      .hero .subtitle {
        font-size: 1.25rem;
        color: var(--text-secondary);
        margin-bottom: 1.5rem;
      }

      /* Content Section */
      .content {
        max-width: 1100px;
        margin: 0 auto;
        padding: 0 2rem 2rem;
      }

      .section {
        margin-bottom: 5rem;
        padding-bottom: 2rem;
      }

      /* --- NEW: SLEEK FILTER MENU --- */
      .filter-menu {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 1rem;
        margin-bottom: 3rem;
      }

      .filter-btn {
        padding: 0.6rem 1.6rem;
        background: #ffffff;
        color: var(--text-main);
        border-radius: 50px;
        border: none;
        font-family: var(--font-main);
        font-weight: 600;
        font-size: 0.95rem;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.04);
        cursor: pointer;
        transition: all 0.2s ease;
      }

      .filter-btn:hover,
      .filter-btn.active {
        background: var(--text-main);
        color: #fff;
        transform: translateY(-2px);
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
      }

      .gallery-item.hide {
        display: none;
      }

      /* --- GALLERY STYLES --- */
      .gallery-grid {
        column-count: 3;
        column-gap: 1.5rem;
      }

      .gallery-item {
        break-inside: avoid;
        margin-bottom: 1.5rem;
        border-radius: 12px;
        overflow: hidden;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.04);
        cursor: pointer;
        background: #fff;
        position: relative;
        animation: fadeIn 0.5s ease;
        transition:
          transform 0.2s ease,
          box-shadow 0.2s ease;
      }

      .gallery-item:hover {
        transform: translateY(-4px);
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
      }

      .gallery-img {
        width: 100%;
        height: auto;
        display: block;
        opacity: 0;
        transition: opacity 0.5s ease;
      }

      .gallery-img.image-loaded {
        opacity: 1;
      }

      .caption-overlay {
        position: absolute;
        bottom: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(26, 26, 26, 0.85);
        color: #fff;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 1.5rem;
        opacity: 0;
        transition: opacity 0.3s ease;
        pointer-events: none;
      }

      .gallery-item:hover .caption-overlay {
        opacity: 1;
      }

      .caption-text {
        font-family: var(--font-main);
        font-size: 1.05rem;
        font-weight: 500;
        transform: translateY(20px);
        transition: transform 0.3s ease;
      }

      .gallery-item:hover .caption-text {
        transform: translateY(0);
      }

      /* Footer */
      footer {
        background: var(--bg-main);
        padding: 4rem 0;
        text-align: center;
        font-size: 0.9rem;
        color: var(--text-secondary);
      }

      /* Responsive */
      @media (max-width: 900px) {
        .gallery-grid {
          column-count: 2;
        }
      }

      @media (max-width: 768px) {
        nav {
          flex-direction: column;
          gap: 1rem;
        }
        .nav-links {
          gap: 1rem;
        }
        .hero {
          padding: 130px 1rem 20px;
        }
        .gallery-grid {
          column-count: 1;
        }
        .filter-menu {
          gap: 0.5rem;
        }
        .filter-btn {
          padding: 0.5rem 1.2rem;
          font-size: 0.9rem;
        }
      }

      /* Animations */
      @keyframes fadeDown {
        from {
          opacity: 0;
          transform: translateY(-20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }
      .reveal {
        opacity: 0;
        transform: translateY(30px);
        transition: all 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
      }
      .reveal.active {
        opacity: 1;
        transform: translateY(0);
      }
      .delay-100 {
        transition-delay: 0.1s;
      }
      .delay-200 {
        transition-delay: 0.2s;
      }
    </style>
  </head>
  <body>
    <nav>
      <a href="index.html" class="logo">Myron Paes</a>
      <ul class="nav-links">
        <li><a href="index.html#about">About</a></li>
        <li><a href="projects.html">Projects</a></li>
        <li><a href="index.html#experience">Experience</a></li>
        <li><a href="index.html#skills">Skills</a></li>
        <li><a href="gallery.html" style="color: var(--accent)">Gallery</a></li>
      </ul>
    </nav>

    <section class="hero">
      <h1 class="reveal">Image Gallery</h1>
      <p class="subtitle reveal delay-100">
        A visual journey of my projects, leadership, and experiences.
      </p>
    </section>

    <div class="content">
      <div class="filter-menu reveal delay-200">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="Hackathons">Hackathons</button>
        <button class="filter-btn" data-filter="Research">Research</button>
        <button class="filter-btn" data-filter="Competitions">
          Competitions
        </button>
        <button class="filter-btn" data-filter="Miscellaneous">
          Miscellaneous
        </button>
      </div>

      <section id="gallery" class="section">
        <div class="gallery-grid" id="gallery-container"></div>
      </section>
    </div>

    <footer>
      <p>&copy; 2026 Myron Paes. All rights reserved.</p>
    </footer>

    <script src="gallery-data.js"></script>

    <script>
      document.addEventListener("DOMContentLoaded", function () {
        const revealElements = document.querySelectorAll(".reveal");
        const revealObserver = new IntersectionObserver(
          (entries, observer) => {
            entries.forEach((entry) => {
              if (entry.isIntersecting) {
                entry.target.classList.add("active");
                observer.unobserve(entry.target);
              }
            });
          },
          { root: null, threshold: 0.15, rootMargin: "0px 0px -50px 0px" },
        );
        revealElements.forEach((el) => {
          revealObserver.observe(el);
        });

        const imgFolder = "pics/";
        const galleryContainer = document.getElementById("gallery-container");

        galleryContainer.innerHTML = "";

        galleryData
          .slice()
          .reverse()
          .forEach((data, index) => {
            const item = document.createElement("div");
            item.className = "gallery-item reveal";

            item.setAttribute("data-filter", data.filter || "Miscellaneous");

            const img = document.createElement("img");
            img.src = imgFolder + data.file;
            img.className = "gallery-img";
            img.alt = data.text;

            img.loading = "lazy";
            img.decoding = "async";
            img.onload = function () {
              img.classList.add("image-loaded");
            };

            const caption = document.createElement("div");
            caption.className = "caption-overlay";

            const captionText = document.createElement("p");
            captionText.className = "caption-text";
            captionText.innerText = data.text;

            caption.appendChild(captionText);

            img.onerror = function () {
              if (img.src.endsWith(".webp")) {
                img.src = img.src.replace(".webp", ".jpg");
              } else if (img.src.endsWith(".jpg")) {
                img.src = img.src.replace(".jpg", ".jpeg");
              } else if (img.src.endsWith(".jpeg")) {
                img.src = img.src.replace(".jpeg", ".png");
              } else {
                item.style.display = "none";
              }
            };

            item.appendChild(img);
            item.appendChild(caption);
            galleryContainer.appendChild(item);

            revealObserver.observe(item);
          });

        const filterBtns = document.querySelectorAll(".filter-btn");
        const galleryItems = document.querySelectorAll(".gallery-item");

        filterBtns.forEach((btn) => {
          btn.addEventListener("click", () => {
            filterBtns.forEach((b) => b.classList.remove("active"));
            btn.classList.add("active");

            const filterValue = btn.getAttribute("data-filter");

            galleryItems.forEach((item) => {
              if (
                filterValue === "all" ||
                item.getAttribute("data-filter") === filterValue
              ) {
                item.classList.remove("hide");
              } else {
                item.classList.add("hide");
              }
            });
          });
        });
      });
    </script>
  </body>
</html>
